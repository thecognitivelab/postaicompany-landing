name: Newsletter Pipeline

on:
  schedule:
    # Monday 15:00 UTC = 12:00 BRT
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if edition already exists'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run newsletter pipeline
        run: python -m pipeline.newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GSC_API_KEY: ${{ secrets.GSC_API_KEY }}
          FORCE_RUN: ${{ inputs.force }}

      - name: Commit and push new content
        run: |
          git config user.name "Post AI Bot"
          git config user.email "bot@postaicompany.com"
          git add content/ config/ reports/
          git diff --staged --quiet || git commit -m "auto: newsletter edition published [skip ci]"
          git push
