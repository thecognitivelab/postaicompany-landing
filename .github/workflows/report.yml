name: Weekly Report

on:
  schedule:
    # Friday 13:00 UTC = 10:00 BRT
    - cron: '0 13 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run weekly report
        run: python -m pipeline.report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}

      - name: Commit report
        run: |
          git config user.name "Post AI Bot"
          git config user.email "bot@postaicompany.com"
          git add reports/
          git diff --staged --quiet || git commit -m "auto: weekly report [skip ci]"
          git push
