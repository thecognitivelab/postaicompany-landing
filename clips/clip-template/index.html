<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post AI Clip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0a0a0a; 
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  
  #stage {
    width: 1080px;
    height: 1920px;
    position: relative;
    background: linear-gradient(135deg, #0a0a0f 0%, #111122 50%, #0d0d1a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  
  /* Avatar area */
  .avatar-zone {
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #0d0d1a 100%);
    border: 2px solid rgba(0,102,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 60px;
    position: relative;
    overflow: hidden;
  }
  
  .avatar-placeholder {
    font-size: 120px;
    color: rgba(0,102,255,0.15);
    font-weight: 700;
    letter-spacing: -4px;
  }
  
  /* Waveform */
  .waveform {
    width: 900px;
    height: 80px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    margin-bottom: 60px;
  }
  
  .waveform .bar {
    width: 8px;
    background: #0066ff;
    border-radius: 4px;
    opacity: 0.7;
    animation: wave 0.8s ease-in-out infinite alternate;
  }
  
  @keyframes wave {
    0% { height: 10px; opacity: 0.3; }
    100% { height: 70px; opacity: 1; }
  }
  
  /* Caption */
  .caption-zone {
    width: 900px;
    text-align: center;
  }
  
  .caption {
    color: #fff;
    font-size: 52px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -1px;
    text-shadow: 0 0 40px rgba(0,102,255,0.3);
  }
  
  .caption .highlight {
    color: #0066ff;
  }
  
  /* Logo bar */
  .logo-bar {
    position: absolute;
    bottom: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .logo-dot-small {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #0066ff;
    box-shadow: 0 0 20px #0066ff;
  }
  
  .logo-text-small {
    color: rgba(255,255,255,0.6);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  
  .cta-text {
    position: absolute;
    bottom: 120px;
    color: rgba(255,255,255,0.4);
    font-size: 20px;
    font-weight: 400;
  }
</style>
</head>
<body>
<div id="stage">
  <!-- Avatar zone -->
  <div class="avatar-zone">
    <div class="avatar-placeholder">A</div>
  </div>
  
  <!-- Waveform animation -->
  <div class="waveform">
    <div class="bar" style="animation-delay: 0s; animation-duration: 0.6s;"></div>
    <div class="bar" style="animation-delay: 0.1s; animation-duration: 0.7s;"></div>
    <div class="bar" style="animation-delay: 0.05s; animation-duration: 0.5s;"></div>
    <div class="bar" style="animation-delay: 0.15s; animation-duration: 0.8s;"></div>
    <div class="bar" style="animation-delay: 0.2s; animation-duration: 0.55s;"></div>
    <div class="bar" style="animation-delay: 0.08s; animation-duration: 0.75s;"></div>
    <div class="bar" style="animation-delay: 0.12s; animation-duration: 0.65s;"></div>
    <div class="bar" style="animation-delay: 0.25s; animation-duration: 0.5s;"></div>
    <div class="bar" style="animation-delay: 0.18s; animation-duration: 0.7s;"></div>
    <div class="bar" style="animation-delay: 0.3s; animation-duration: 0.6s;"></div>
    <div class="bar" style="animation-delay: 0.22s; animation-duration: 0.8s;"></div>
    <div class="bar" style="animation-delay: 0.35s; animation-duration: 0.55s;"></div>
    <div class="bar" style="animation-delay: 0.28s; animation-duration: 0.7s;"></div>
    <div class="bar" style="animation-delay: 0.4s; animation-duration: 0.65s;"></div>
    <div class="bar" style="animation-delay: 0.32s; animation-duration: 0.5s;"></div>
    <div class="bar" style="animation-delay: 0.15s; animation-duration: 0.75s;"></div>
    <div class="bar" style="animation-delay: 0.38s; animation-duration: 0.6s;"></div>
    <div class="bar" style="animation-delay: 0.42s; animation-duration: 0.7s;"></div>
    <div class="bar" style="animation-delay: 0.05s; animation-duration: 0.55s;"></div>
    <div class="bar" style="animation-delay: 0.45s; animation-duration: 0.8s;"></div>
    <div class="bar" style="animation-delay: 0.1s; animation-duration: 0.65s;"></div>
    <div class="bar" style="animation-delay: 0.48s; animation-duration: 0.5s;"></div>
    <div class="bar" style="animation-delay: 0.33s; animation-duration: 0.7s;"></div>
    <div class="bar" style="animation-delay: 0.5s; animation-duration: 0.6s;"></div>
  </div>
  
  <!-- Caption -->
  <div class="caption-zone">
    <div class="caption">
      <span class="highlight">11 people.</span><br>
      $200 million.<br>
      No sales team.
    </div>
  </div>
  
  <!-- CTA -->
  <div class="cta-text">Full episode on Spotify, Apple, and postaicompany.com</div>
  
  <!-- Logo -->
  <div class="logo-bar">
    <div class="logo-dot-small"></div>
    <span class="logo-text-small">Post AI Sessions</span>
  </div>
</div>
</body>
</html>
