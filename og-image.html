<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; width:1200px; height:630px; overflow:hidden; }
.wrap {
  width:1200px; height:630px;
  background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
  position: relative; font-family: system-ui, -apple-system, sans-serif;
}
.circle1 { position:absolute; top:-100px; right:-50px; width:500px; height:500px; border-radius:50%; background:rgba(0,102,255,0.08); }
.circle2 { position:absolute; bottom:-100px; left:0; width:400px; height:400px; border-radius:50%; background:rgba(0,102,255,0.05); }
.content { position:absolute; top:80px; left:80px; right:80px; }
.kicker { font-family: 'Courier New', monospace; font-size:18px; font-weight:500; color:rgba(255,255,255,0.5); letter-spacing:4px; margin-bottom:40px; }
h1 { font-size:68px; font-weight:700; color:#fff; letter-spacing:-2px; line-height:1.1; margin:0 0 16px 0; }
h1 span { color:#0066ff; }
.sub { font-size:22px; color:rgba(255,255,255,0.6); margin-top:24px; }
.btn { display:inline-block; margin-top:36px; padding:14px 28px; background:#fff; color:#0d0d0d; border-radius:8px; font-size:17px; font-weight:600; }
.url { position:absolute; bottom:30px; right:80px; font-family:'Courier New',monospace; font-size:18px; color:rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div class="wrap">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="content">
    <div class="kicker">NEWSLETTER SEMANAL</div>
    <h1>O futuro não espera.<br><span>Nem sua caixa de entrada.</span></h1>
    <div class="sub">Curadoria essencial sobre IA e futuro do trabalho — toda quarta, 5 minutos.</div>
    <div class="btn">Assinar grátis →</div>
  </div>
  <div class="url">postaicompany.com</div>
</div>
</body>
</html>
